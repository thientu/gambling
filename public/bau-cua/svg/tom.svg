<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sea-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20B2AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008B8B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#sea-grad)" stroke="#333" stroke-width="2"/>
  <!-- Shrimp tail segments -->
  <ellipse cx="50" cy="75" rx="8" ry="6" fill="#FF6347" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="50" cy="66" rx="10" ry="7" fill="#FF6347" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="50" cy="56" rx="11" ry="8" fill="#FF6347" stroke="#333" stroke-width="1.5"/>
  <!-- Shrimp body -->
  <ellipse cx="50" cy="44" rx="12" ry="10" fill="#FF6347" stroke="#333" stroke-width="2"/>
  <!-- Shrimp head -->
  <ellipse cx="50" cy="32" rx="14" ry="12" fill="#FF6347" stroke="#333" stroke-width="2"/>
  <!-- Antennae -->
  <path d="M 40 25 Q 35 15 30 8" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 45 23 Q 42 12 38 5" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 55 23 Q 58 12 62 5" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 60 25 Q 65 15 70 8" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="44" cy="30" r="3" fill="#FFF" stroke="#333" stroke-width="1"/>
  <circle cx="56" cy="30" r="3" fill="#FFF" stroke="#333" stroke-width="1"/>
  <circle cx="44" cy="30" r="1.5" fill="#333"/>
  <circle cx="56" cy="30" r="1.5" fill="#333"/>
  <!-- Legs -->
  <path d="M 40 40 Q 32 45 28 42" stroke="#CD5C5C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 40 44 Q 30 50 25 48" stroke="#CD5C5C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 60 40 Q 68 45 72 42" stroke="#CD5C5C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 60 44 Q 70 50 75 48" stroke="#CD5C5C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tail fan -->
  <path d="M 42 78 L 50 85 L 58 78" fill="#FF6347" stroke="#333" stroke-width="1.5"/>
  <path d="M 44 80 L 50 86 L 56 80" fill="#FF4500" stroke="none"/>
</svg>
