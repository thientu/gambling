<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="earth-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5344;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#earth-grad)" stroke="#333" stroke-width="2"/>
  <!-- Calabash/gourd body - bottom bulb -->
  <ellipse cx="50" cy="62" rx="22" ry="24" fill="#90EE90" stroke="#333" stroke-width="2"/>
  <!-- Calabash neck - top narrower part -->
  <ellipse cx="50" cy="35" rx="10" ry="12" fill="#90EE90" stroke="#333" stroke-width="2"/>
  <!-- Connection between neck and body -->
  <ellipse cx="50" cy="47" rx="12" ry="5" fill="#7CCD7C" stroke="#333" stroke-width="1.5"/>
  <!-- Stem -->
  <rect x="47" y="18" width="6" height="8" rx="2" fill="#8B4513" stroke="#333" stroke-width="1.5"/>
  <!-- Leaves on top -->
  <ellipse cx="42" cy="20" rx="8" ry="4" fill="#228B22" stroke="#333" stroke-width="1" transform="rotate(-30 42 20)"/>
  <ellipse cx="58" cy="20" rx="8" ry="4" fill="#228B22" stroke="#333" stroke-width="1" transform="rotate(30 58 20)"/>
  <!-- Vertical ridge line -->
  <path d="M 50 23 L 50 85" stroke="#7CCD7C" stroke-width="2" fill="none"/>
  <!-- Horizontal curved lines for gourd texture -->
  <path d="M 32 55 Q 50 60 68 55" stroke="#7CCD7C" stroke-width="1.5" fill="none"/>
  <path d="M 30 65 Q 50 70 70 65" stroke="#7CCD7C" stroke-width="1.5" fill="none"/>
  <path d="M 32 75 Q 50 80 68 75" stroke="#7CCD7C" stroke-width="1.5" fill="none"/>
  <!-- Shine highlight -->
  <ellipse cx="40" cy="55" rx="6" ry="8" fill="#FFF" opacity="0.3"/>
</svg>
