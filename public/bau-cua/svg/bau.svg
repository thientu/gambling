<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#bg-grad)" stroke="#333" stroke-width="2"/>
  <!-- Deer body -->
  <ellipse cx="50" cy="60" rx="20" ry="15" fill="#D2691E" stroke="#333" stroke-width="1.5"/>
  <!-- Deer head -->
  <ellipse cx="50" cy="42" rx="12" ry="10" fill="#D2691E" stroke="#333" stroke-width="1.5"/>
  <!-- Antlers -->
  <path d="M 42 34 Q 38 25 40 18" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 58 34 Q 62 25 60 18" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 40 20 Q 36 16 38 12" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 60 20 Q 64 16 62 12" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="46" cy="40" r="2" fill="#333"/>
  <circle cx="54" cy="40" r="2" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="50" cy="46" rx="3" ry="2" fill="#333"/>
  <!-- Legs -->
  <rect x="38" y="70" width="4" height="15" rx="2" fill="#D2691E" stroke="#333" stroke-width="1"/>
  <rect x="46" y="72" width="4" height="13" rx="2" fill="#D2691E" stroke="#333" stroke-width="1"/>
  <rect x="54" y="72" width="4" height="13" rx="2" fill="#D2691E" stroke="#333" stroke-width="1"/>
  <rect x="62" y="70" width="4" height="15" rx="2" fill="#D2691E" stroke="#333" stroke-width="1"/>
</svg>
