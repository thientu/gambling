<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ocean-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#ocean-grad)" stroke="#333" stroke-width="2"/>
  <!-- Fish body -->
  <ellipse cx="50" cy="50" rx="25" ry="18" fill="#4169E1" stroke="#333" stroke-width="2"/>
  <!-- Fish head -->
  <ellipse cx="35" cy="50" rx="12" ry="14" fill="#4169E1" stroke="#333" stroke-width="2"/>
  <!-- Tail -->
  <path d="M 75 50 Q 85 40 90 50 Q 85 60 75 50" fill="#1E3A8A" stroke="#333" stroke-width="2"/>
  <!-- Dorsal fin -->
  <path d="M 45 32 Q 50 22 55 32" fill="#1E3A8A" stroke="#333" stroke-width="1.5"/>
  <!-- Pectoral fins -->
  <path d="M 38 55 Q 30 60 35 65" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <path d="M 45 58 Q 42 65 47 68" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <!-- Scales pattern -->
  <path d="M 45 42 Q 50 40 55 42" stroke="#87CEEB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 45 50 Q 50 48 55 50" stroke="#87CEEB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 45 58 Q 50 56 55 58" stroke="#87CEEB" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Eye -->
  <circle cx="32" cy="46" r="4" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <circle cx="32" cy="46" r="2" fill="#333"/>
  <circle cx="31" cy="45" r="0.8" fill="#FFF"/>
  <!-- Mouth -->
  <path d="M 25 50 Q 20 48 22 52" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Side fin -->
  <path d="M 50 55 Q 55 60 52 65" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <!-- Gill line -->
  <path d="M 40 45 Q 42 50 40 55" stroke="#1E3A8A" stroke-width="1.5" fill="none"/>
</svg>
