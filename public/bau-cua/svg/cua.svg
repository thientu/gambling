<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="water-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#water-grad)" stroke="#333" stroke-width="2"/>
  <!-- Crab body -->
  <ellipse cx="50" cy="55" rx="22" ry="18" fill="#DC143C" stroke="#333" stroke-width="2"/>
  <!-- Eyes on stalks -->
  <line x1="40" y1="45" x2="38" y2="32" stroke="#8B0000" stroke-width="3"/>
  <line x1="60" y1="45" x2="62" y2="32" stroke="#8B0000" stroke-width="3"/>
  <circle cx="38" cy="30" r="5" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <circle cx="62" cy="30" r="5" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <circle cx="38" cy="30" r="2" fill="#333"/>
  <circle cx="62" cy="30" r="2" fill="#333"/>
  <!-- Left claws -->
  <ellipse cx="25" cy="50" rx="10" ry="8" fill="#DC143C" stroke="#333" stroke-width="2" transform="rotate(-30 25 50)"/>
  <ellipse cx="22" cy="58" rx="8" ry="6" fill="#FF6B6B" stroke="#333" stroke-width="1.5" transform="rotate(-40 22 58)"/>
  <!-- Right claws -->
  <ellipse cx="75" cy="50" rx="10" ry="8" fill="#DC143C" stroke="#333" stroke-width="2" transform="rotate(30 75 50)"/>
  <ellipse cx="78" cy="58" rx="8" ry="6" fill="#FF6B6B" stroke="#333" stroke-width="1.5" transform="rotate(40 78 58)"/>
  <!-- Left legs -->
  <path d="M 32 55 Q 20 60 15 55" stroke="#8B0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 30 60 Q 18 65 12 62" stroke="#8B0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right legs -->
  <path d="M 68 55 Q 80 60 85 55" stroke="#8B0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 70 60 Q 82 65 88 62" stroke="#8B0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M 45 62 Q 50 65 55 62" stroke="#333" stroke-width="1.5" fill="none"/>
</svg>
