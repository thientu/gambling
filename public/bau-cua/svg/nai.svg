<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="forest-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#forest-grad)" stroke="#333" stroke-width="2"/>
  <!-- Deer body -->
  <ellipse cx="50" cy="60" rx="20" ry="15" fill="#DAA520" stroke="#333" stroke-width="2"/>
  <!-- Deer neck -->
  <ellipse cx="45" cy="48" rx="8" ry="12" fill="#DAA520" stroke="#333" stroke-width="1.5"/>
  <!-- Deer head -->
  <ellipse cx="48" cy="35" rx="12" ry="10" fill="#DAA520" stroke="#333" stroke-width="2"/>
  <!-- Snout -->
  <ellipse cx="58" cy="38" rx="5" ry="4" fill="#F4A460" stroke="#333" stroke-width="1.5"/>
  <!-- Antlers -->
  <path d="M 42 26 Q 38 15 40 8" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 54 26 Q 58 15 56 8" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 40 12 Q 34 8 36 4" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 40 12 Q 38 6 42 2" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 56 12 Q 62 8 60 4" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 56 12 Q 58 6 54 2" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="40" cy="28" rx="4" ry="7" fill="#DAA520" stroke="#333" stroke-width="1.5" transform="rotate(-20 40 28)"/>
  <ellipse cx="56" cy="28" rx="4" ry="7" fill="#DAA520" stroke="#333" stroke-width="1.5" transform="rotate(20 56 28)"/>
  <!-- Eyes -->
  <circle cx="46" cy="33" r="2.5" fill="#FFF" stroke="#333" stroke-width="1"/>
  <circle cx="54" cy="33" r="2.5" fill="#FFF" stroke="#333" stroke-width="1"/>
  <circle cx="46" cy="33" r="1.2" fill="#333"/>
  <circle cx="54" cy="33" r="1.2" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="60" cy="38" rx="2.5" ry="2" fill="#333"/>
  <!-- Spots -->
  <ellipse cx="45" cy="58" rx="3" ry="2" fill="#FFF8DC" opacity="0.7"/>
  <ellipse cx="55" cy="62" rx="3" ry="2" fill="#FFF8DC" opacity="0.7"/>
  <!-- Legs -->
  <rect x="36" y="70" width="5" height="16" rx="2.5" fill="#DAA520" stroke="#333" stroke-width="1.5"/>
  <rect x="45" y="72" width="5" height="14" rx="2.5" fill="#DAA520" stroke="#333" stroke-width="1.5"/>
  <rect x="54" y="72" width="5" height="14" rx="2.5" fill="#DAA520" stroke="#333" stroke-width="1.5"/>
  <rect x="63" y="70" width="5" height="16" rx="2.5" fill="#DAA520" stroke="#333" stroke-width="1.5"/>
  <!-- Hooves -->
  <rect x="35" y="84" width="7" height="4" rx="1" fill="#8B4513"/>
  <rect x="44" y="84" width="7" height="4" rx="1" fill="#8B4513"/>
  <rect x="53" y="84" width="7" height="4" rx="1" fill="#8B4513"/>
  <rect x="62" y="84" width="7" height="4" rx="1" fill="#8B4513"/>
</svg>
